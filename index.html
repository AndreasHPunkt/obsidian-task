<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="no">
    <meta name="apple-mobile-web-app-title" content="Task">
    <title>Obsidian Task</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        h1 {
            font-size: 20px;
            margin-bottom: 24px;
            color: #a78bfa;
        }
        #task {
            width: 100%;
            max-width: 400px;
            padding: 16px;
            font-size: 18px;
            border: 2px solid #a78bfa;
            border-radius: 12px;
            background: #16213e;
            color: #e0e0e0;
            outline: none;
            -webkit-appearance: none;
        }
        #task:focus {
            border-color: #c4b5fd;
            box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.3);
        }
        #task::placeholder { color: #666; }
        button {
            width: 100%;
            max-width: 400px;
            margin-top: 16px;
            padding: 16px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            background: #a78bfa;
            color: #1a1a2e;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        button:active { background: #8b5cf6; }
        .success {
            margin-top: 16px;
            font-size: 16px;
            color: #4ade80;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .success.show { opacity: 1; }
    </style>
</head>
<body>
    <h1>Aufgabe erfassen</h1>
    <input type="text" id="task" placeholder="Aufgabe eingeben oder diktieren…" autocomplete="off" autofocus>
    <button onclick="addTask()">Task hinzufügen</button>
    <div class="success" id="msg">Aufgabe gesendet!</div>
    <div id="debug" style="margin-top:24px; padding:12px; font-size:12px; color:#888; word-break:break-all; max-width:400px;"></div>
    <a id="link" style="display:none; margin-top:16px; color:#a78bfa; font-size:16px; text-decoration:underline;">Manuell öffnen</a>

    <script>
        function addTask() {
            const input = document.getElementById('task');
            const task = input.value.trim();
            if (!task) return;

            const today = new Date().toISOString().slice(0, 10);
            const data = '- [ ] ' + task + ' ➕ ' + today + ' 📅 ' + today;

            const e = encodeURIComponent;
            const url = 'obsidian://advanced-uri'
                + '?vault=' + e("Andreas' Remote Vault")
                + '&daily=true'
                + '&heading=' + e('Aufgaben erfassen')
                + '&data=' + e(data)
                + '&mode=append';

            // Debug: URL anzeigen
            document.getElementById('debug').textContent = url;
            const link = document.getElementById('link');
            link.href = url;
            link.style.display = 'block';

            // Redirect
            window.location.href = url;
        }

        // Enter-Taste zum Absenden
        document.getElementById('task').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') addTask();
        });
    </script>
</body>
</html>
